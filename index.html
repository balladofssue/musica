<script>

function limitarAudio(audio, inicio, fim){

audio.addEventListener("loadedmetadata", () => {
audio.currentTime = inicio;
});

audio.addEventListener("timeupdate", () => {
if(audio.currentTime >= fim){
audio.pause();
}
});

}

limitarAudio(player1, 35, 40);
limitarAudio(player2, 2, 7);
limitarAudio(player3, 40, 45);
limitarAudio(player4, 60, 65);
limitarAudio(player5, 8, 13);
limitarAudio(player6, 20, 25);
limitarAudio(player7, 35, 40);
limitarAudio(player8, 40, 45);
limitarAudio(player9, 55, 60);
limitarAudio(player10, 70, 75);

function verificar(numero, respostaCorreta){

let resposta =
document.querySelector(`input[name="musica${numero}"]:checked`);

let mensagem =
document.getElementById(`mensagem${numero}`);

if(!resposta){

mensagem.innerHTML = "escolha uma opção!";
mensagem.className = "melhore!";

}

else if(resposta.value !== respostaCorreta){

mensagem.innerHTML = "melhore!";
mensagem.className = "erro";

}

else{

mensagem.innerHTML = "arraso! continue assim";
mensagem.className = "acerto";

}

}

function verificar1(){verificar(1,"ifuseekamy")}
function verificar2(){verificar(2,"gorgeous")}
