<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>balladofssue</title>
    <link rel="stylesheet" href="musica.css" />
</head>
<body>

<h2>Advinha a música com apenas 5 segundos</h2>

<audio id="player" controls autoplay>
    <source src="drop dead.mp3" type="audio/mpeg">
    Seu navegador não suporta áudio.
</audio>

<script>
    const audio = document.getElementById("player");
    audio.addEventListener("loadedmetadata", () => {
    audio.currentTime = 10;
});

audio.addEventListener("timeupdate", () => {
    if (audio.currentTime >= 20) {
        audio.pause();
    }
});
</script>
        <div class="musica">
            <div>
            <input type="radio" name="musica1" id="m1">
            <label for="m1">Drop dead - Olivia Rodrigo</label>

            <div>
            <input type="radio" name="musica1" id="m2">
            <label for="m2">The Cure - Olivia Rodrigo</label>

            <div>
            <input type="radio" name="musica1" id="m3">
            <label for="m3">Obsessed - Olivia Rodrigo</label>
            </div>
        </div>

</body>
</html>
